server {
    listen 80;
    server_name _;

    # Servir la aplicación web
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy hacia GenieACS NBI - evita el error de CORS
    location /nbi/ {

        # Manejar preflight CORS (OPTIONS) correctamente
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://router.netcauca.com:7557/;
        proxy_http_version 1.1;
        proxy_set_header Host router.netcauca.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type $content_type;
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Cabeceras CORS para respuestas normales
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept' always;
    }
}

